<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback — preserves the requested path/hash on refresh.
      (function () {
        var path = window.location.pathname.replace(/^\/[^/]+\//, '/')
        var hash = window.location.hash || ''
        window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, 2).join('/') + '/#' + path + hash.replace(/^#/, ''))
      })()
    </script>
  </head>
  <body>Redirecting…</body>
</html>
