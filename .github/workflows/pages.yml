name: Deploy to GitHub Pages

# STAGING PILOT: builds the Supabase-connected app (VITE_DATA_BACKEND=supabase)
# using the publishable/anon key supplied via repo secrets. NO service-role key.
# Requires repo secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL        = https://zlgxalmaiwatnoydgkxo.supabase.co
#   VITE_SUPABASE_ANON_KEY   = <publishable anon key>   (NOT the service-role key)
# Without those secrets the build still runs but logs in mock-broken state, so add them first.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (Supabase-connected, Pages base path)
        run: npm run build:pages
        env:
          VITE_DATA_BACKEND: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
